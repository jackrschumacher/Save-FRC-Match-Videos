<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBA YouTube Link Extractor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #f4f4f9;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        h1 { color: #3f51b5; margin-top: 0; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 0.5rem; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 4px;
        }
        button {
            background-color: #3f51b5; color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer;
            font-size: 1rem; font-weight: bold; margin-right: 0.5rem; margin-bottom: 0.5rem;
        }
        button:hover { background-color: #303f9f; }
        button:disabled { background-color: #9fa8da; cursor: not-allowed; }
        
        .btn-success { background-color: #4caf50; }
        .btn-success:hover { background-color: #388e3c; }
        
        .btn-youtube { background-color: #ff0000; }
        .btn-youtube:hover { background-color: #cc0000; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        a { color: #d32f2f; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        #status { margin-top: 1rem; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TBA Video Extractor</h1>
        <p>Pull organized YouTube links for any FRC team directly from The Blue Alliance API.</p>
        
        <div class="form-group">
            <label for="apiKey">TBA API Read Key (Required):</label>
            <input type="text" id="apiKey" placeholder="Paste your API key from thebluealliance.com/account">
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="teamNumber">Team Number:</label>
                <input type="number" id="teamNumber" placeholder="e.g., 930" value="930">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="year">Year:</label>
                <input type="number" id="year" placeholder="e.g., 2024" value="2024">
            </div>
        </div>

        <button id="fetchBtn" onclick="fetchVideos()">Fetch Matches</button>
        <button id="exportBtn" class="btn-success" onclick="exportToCSV()" style="display: none;">Export to CSV</button>
        <button id="playlistBtn" class="btn-youtube" onclick="openPlaylist()" style="display: none;">▶ Open as YouTube Playlist</button>
        
        <div id="status"></div>
    </div>

    <div class="card" id="resultsCard" style="display: none;">
        <h2>Match Videos</h2>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Event</th>
                    <th>Match</th>
                    <th>Link</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
                </tbody>
        </table>
    </div>

    <script>
        let globalMatchData = [];
        let globalVideoIds = [];

        async function fetchVideos() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const teamNumber = document.getElementById('teamNumber').value.trim();
            const year = document.getElementById('year').value.trim();
            const statusDiv = document.getElementById('status');
            const resultsCard = document.getElementById('resultsCard');
            const resultsBody = document.getElementById('resultsBody');
            const exportBtn = document.getElementById('exportBtn');
            const playlistBtn = document.getElementById('playlistBtn');
            const fetchBtn = document.getElementById('fetchBtn');

            if (!apiKey) {
                alert("Please enter your TBA API Key.");
                return;
            }

            statusDiv.textContent = "Fetching data from The Blue Alliance...";
            fetchBtn.disabled = true;
            resultsBody.innerHTML = '';
            globalMatchData = [];
            globalVideoIds = [];

            const tbaEndpoint = `https://www.thebluealliance.com/api/v3/team/frc${teamNumber}/matches/${year}`;

            try {
                const response = await fetch(tbaEndpoint, {
                    headers: { 'X-TBA-Auth-Key': apiKey }
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const matches = await response.json();
                
                const matchesWithVideos = matches.filter(match => match.videos && match.videos.length > 0);

                if (matchesWithVideos.length === 0) {
                    statusDiv.textContent = `No videos found for Team ${teamNumber} in ${year}.`;
                    resultsCard.style.display = 'none';
                    exportBtn.style.display = 'none';
                    playlistBtn.style.display = 'none';
                    fetchBtn.disabled = false;
                    return;
                }

                matchesWithVideos.sort((a, b) => a.event_key.localeCompare(b.event_key) || a.match_number - b.match_number);

                matchesWithVideos.forEach(match => {
                    match.videos.forEach(video => {
                        if (video.type === 'youtube') {
                            const eventName = match.event_key.toUpperCase();
                            const matchName = `${match.comp_level.toUpperCase()} ${match.match_number}`;
                            const youtubeUrl = `https://www.youtube.com/watch?v=${video.key}`;

                            // Save for CSV and Playlist
                            globalMatchData.push({ event: eventName, match: matchName, url: youtubeUrl });
                            globalVideoIds.push(video.key);

                            // Add to HTML table
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td>${eventName}</td>
                                <td>${matchName}</td>
                                <td><a href="${youtubeUrl}" target="_blank">Watch on YouTube ↗</a></td>
                            `;
                            resultsBody.appendChild(tr);
                        }
                    });
                });

                statusDiv.textContent = `Found ${globalMatchData.length} videos!`;
                resultsCard.style.display = 'block';
                exportBtn.style.display = 'inline-block';
                playlistBtn.style.display = 'inline-block';

            } catch (error) {
                statusDiv.textContent = `Error: ${error.message}`;
                console.error(error);
            } finally {
                fetchBtn.disabled = false;
            }
        }

        function exportToCSV() {
            if (globalMatchData.length === 0) return;

            let csvContent = "Event,Match,YouTube Link\n";
            globalMatchData.forEach(row => {
                csvContent += `${row.event},${row.match},${row.url}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            link.setAttribute("href", url);
            link.setAttribute("download", `team_${document.getElementById('teamNumber').value}_videos_${document.getElementById('year').value}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function openPlaylist() {
            if (globalVideoIds.length === 0) return;

            // YouTube's anonymous playlist limit is ~50 videos. We chunk them if there are more.
            const chunkSize = 50;
            
            if (globalVideoIds.length > chunkSize) {
                alert(`You have ${globalVideoIds.length} videos. YouTube limits these playlists to 50 videos each. We will open multiple tabs for you.`);
            }

            for (let i = 0; i < globalVideoIds.length; i += chunkSize) {
                const chunk = globalVideoIds.slice(i, i + chunkSize);
                const playlistUrl = `https://www.youtube.com/watch_videos?video_ids=${chunk.join(',')}`;
                
                // Open each chunk in a new tab
                window.open(playlistUrl, '_blank');
            }
        }
    </script>
</body>
</html>
